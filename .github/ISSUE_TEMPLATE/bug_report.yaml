name: Bug Report
description: Create a report if you think something is not working as intended.
title: "[Bug] "
labels: ["Bug"]
assignees:
  - Luncaaa
body:
  - type: markdown
    attributes:
      value: |
        Create a bug report if you think something is not working as intended.
  - type: checkboxes
    id: latest-version
    attributes:
      label: Latest version
      description: By submitting this issue, you confirm that you are using the plugin's latest version. Download it [here](https://www.spigotmc.org/resources/advancedlinks.117605/).
      options:
        - label: I am using the plugin's latest version.
          required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: x command throws an IllegalArgumentException.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: How can the bug be reproduced?
      description: Explain how to reproduce the error.
      placeholder: |
        1. Do this
        2. Do that
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
      placeholder: The error not occurring.
    validations:
      required: true
  - type: dropdown
    id: software
    attributes:
      label: Server Software
      options:
        - Fabric
        - NeoForge
        - Velocity
        - BungeeCord
        - Purpur
        - Paper
        - Spigot
        - Bukkit
        - Other
    validations:
      required: true
  - type: dropdown
    id: minecraft-version
    attributes:
      label: Minecraft version
      options:
        - "3.5.0 (Velocity)"
        - "1.21"
        - "1.21.1"
        - "1.21.2"
        - "1.21.3"
        - "1.21.4"
        - "1.21.5"
        - "1.21.6"
        - "1.21.7"
        - "1.21.8"
        - "1.21.9"
        - "1.21.10"
        - "1.21.11"
    validations:
      required: true
